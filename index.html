        @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
        .fda-root{--bg:#14151a;--panel:#1d1f26;--panel2:#24262e;--line:#2e3039;--ink:#ece9e4;--muted:#8d8f98;--gold:#c2703d;--go:#4cae7d;--no:#d9534f;background:var(--bg);color:var(--ink);font-family:'Archivo',system-ui,sans-serif;min-height:100%;padding:calc(env(safe-area-inset-top, 0px) + 26px) 22px calc(env(safe-area-inset-bottom, 0px) + 80px);box-sizing:border-box;-webkit-font-smoothing:antialiased;}
        .fda-root *{box-sizing:border-box;}
        .mono{font-family:'IBM Plex Mono',ui-monospace,monospace;font-variant-numeric:tabular-nums;}
        .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:700;}
        .h1{font-size:24px;font-weight:800;letter-spacing:-.01em;margin:4px 0 0;}
        .sub{font-size:12.5px;color:var(--muted);margin-top:3px;}
        .modetabs{display:flex;gap:6px;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:5px;margin-top:18px;max-width:340px;}
        .modetabs button{flex:1;border:0;background:transparent;color:var(--muted);font-family:'Archivo';font-size:13px;font-weight:700;letter-spacing:.04em;padding:10px;border-radius:7px;cursor:pointer;transition:.15s;}
        .modetabs button.on{background:var(--gold);color:#1f0f06;}
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:18px;}
        @media (max-width:820px){.grid{grid-template-columns:1fr;}}
        .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px 18px 6px;}
        .card.flush{padding-bottom:18px;}
        .card+.card{margin-top:18px;}
        .card-title{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
        .card-title::before{content:"";width:14px;height:2px;background:var(--gold);display:inline-block;}
        .field{margin-bottom:14px;}
        .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:500;}
        .dl{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
        .dl label{margin:0;}
        .seg{display:flex;gap:2px;background:var(--panel2);border:1px solid var(--line);border-radius:7px;padding:2px;}
        .seg button{border:0;background:transparent;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;width:26px;height:20px;border-radius:5px;cursor:pointer;line-height:1;}
        .seg button.on{background:var(--gold);color:#1f0f06;}
        .help{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.5;}
        .inwrap{position:relative;display:flex;align-items:center;}
        .adorn{position:absolute;font-size:13px;color:var(--muted);}
        .adorn.l{left:12px;}.adorn.r{right:12px;}
        input.num{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:9px;color:var(--ink);font-family:'IBM Plex Mono',monospace;font-size:15px;font-variant-numeric:tabular-nums;padding:11px 12px 11px 24px;outline:none;transition:border-color .15s,box-shadow .15s;}
        input.num.pctin{padding:11px 28px 11px 12px;}
        .txt{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:9px;color:var(--ink);font-family:'Archivo';font-size:14px;padding:11px 12px;outline:none;}
        input.num:focus,.txt:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(194,112,61,.18);}
        input.num::-webkit-outer-spin-button,input.num::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
        input.num[type=number]{-moz-appearance:textfield;}
        .toggle{display:flex;gap:6px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:4px;margin-bottom:12px;}
        .toggle button{flex:1;border:0;background:transparent;color:var(--muted);font-family:'Archivo';font-size:12.5px;font-weight:600;padding:8px;border-radius:6px;cursor:pointer;transition:.15s;}
        .toggle button.on{background:var(--gold);color:#1f0f06;}
        .tierbtns{display:flex;gap:6px;margin-bottom:12px;}
        .tierbtns button{flex:1;border:1px solid var(--line);background:var(--panel2);color:var(--muted);font-family:'Archivo';font-size:11.5px;font-weight:600;padding:8px 4px;border-radius:7px;cursor:pointer;}
        .tierbtns button.on{border-color:var(--gold);color:var(--gold);}
        .tierbtns button small{display:block;font-size:9.5px;color:var(--muted);font-weight:500;margin-top:1px;}
        .effrow{display:flex;justify-content:space-between;align-items:baseline;padding:10px 0 6px;border-top:1px solid var(--line);margin-top:4px;}
        .effrow .k{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;}
        .effrow .v{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:600;color:var(--gold);}
        .checkrow{display:flex;align-items:flex-start;gap:10px;cursor:pointer;padding:10px 0 4px;}
        .checkrow .box{width:18px;height:18px;border-radius:5px;border:1px solid var(--line);background:var(--panel2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:.15s;}
        .checkrow .box.on{background:var(--gold);border-color:var(--gold);}
        .checkrow .box.on::after{content:"";width:5px;height:9px;border:solid #1f0f06;border-width:0 2px 2px 0;transform:rotate(45deg);margin-bottom:2px;}
        .checkrow span{font-size:12.5px;color:var(--ink);line-height:1.35;}
        .checkrow span small{color:var(--muted);display:block;font-size:11px;}
        .slider{width:100%;-webkit-appearance:none;appearance:none;height:4px;border-radius:3px;background:var(--line);outline:none;margin-top:6px;}
        .slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--gold);cursor:pointer;border:3px solid var(--bg);box-shadow:0 0 0 1px var(--gold);}
        .slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--gold);cursor:pointer;border:3px solid var(--bg);}
        .verdict{border-radius:14px;border:1px solid var(--line);padding:18px;background:var(--panel);}
        .vbadge{font-size:24px;font-weight:800;letter-spacing:.02em;}
        .vnote{font-size:12.5px;color:var(--muted);margin-top:4px;line-height:1.45;}
        .hero{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin-top:18px;}
        .hero .lbl{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:700;}
        .hero .big{font-size:38px;font-weight:600;color:var(--gold);letter-spacing:-.01em;margin-top:2px;}
        .hero .delta{font-size:12.5px;margin-top:6px;}
        .tiers{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin-top:18px;}
        .tierrow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);}
        .tierrow:last-child{border-bottom:0;}
        .tierrow .tl{font-size:12.5px;font-weight:600;}
        .tierrow .tl small{display:block;color:var(--muted);font-size:11px;font-weight:500;}
        .tierrow .tv{font-family:'IBM Plex Mono',monospace;font-size:19px;font-weight:600;}
        .tiles{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px;}
        .tile{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;}
        .tile .t-lbl{font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);font-weight:700;}
        .tile .t-val{font-size:22px;font-weight:600;margin-top:5px;}
        .tile .t-sub{font-size:11px;color:var(--muted);margin-top:3px;}
        .memo{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin-top:18px;}
        .memo .row{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;font-size:13px;}
        .memo .row .k{color:var(--muted);}
        .memo .row .v{font-size:14px;}
        .memo .rule{height:1px;background:var(--line);margin:6px 0;}
        .memo .sect{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin:14px 0 4px;}
        .memo .total .k{color:var(--ink);font-weight:600;}
        .neg{color:var(--no);}.goldv{color:var(--gold);}
        .stress{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin-top:18px;}
        .stable{width:100%;border-collapse:collapse;margin-top:4px;}
        .stable th,.stable td{padding:9px 6px;text-align:center;font-size:12px;}
        .stable th{color:var(--muted);font-weight:600;font-family:'Archivo';font-size:10.5px;letter-spacing:.04em;}
        .stable td.rl{text-align:left;color:var(--muted);font-size:10.5px;font-weight:600;font-family:'Archivo';white-space:nowrap;}
        .stable td.cell{border-radius:7px;font-family:'IBM Plex Mono',monospace;font-weight:600;}
        .actions{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;}
        .actions button{flex:1;min-width:110px;border:1px solid var(--line);background:var(--panel2);color:var(--ink);font-family:'Archivo';font-weight:600;font-size:12.5px;padding:11px;border-radius:9px;cursor:pointer;transition:.15s;}
        .actions button:hover{border-color:var(--gold);color:var(--gold);}
        .actions button.primary{background:var(--gold);color:#1f0f06;border-color:var(--gold);}
        .actions button.primary:hover{color:#1f0f06;opacity:.92;}
        .savedrow{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);gap:12px;}
        .savedrow:last-child{border-bottom:0;}
        .sd-name{font-size:13.5px;font-weight:600;color:var(--ink);}
        .sd-meta{font-size:11px;color:var(--muted);margin-top:2px;}
        .sd-btns{display:flex;gap:6px;flex-shrink:0;}
        .sd-btns button{border:1px solid var(--line);background:var(--panel2);color:var(--muted);font-family:'Archivo';font-size:11.5px;font-weight:600;padding:6px 12px;border-radius:7px;cursor:pointer;}
        .sd-btns button:hover{border-color:var(--gold);color:var(--gold);}
        .foot{font-size:11px;color:var(--muted);margin-top:18px;line-height:1.55;}
        .fg-fab{position:fixed;bottom:calc(env(safe-area-inset-bottom, 0px) + 18px);right:16px;z-index:9999;background:#14151a;border:1px solid var(--gold);color:var(--gold);font-family:'Archivo',system-ui,sans-serif;font-size:13px;font-weight:600;padding:11px 18px;border-radius:10px;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.5);}

        .print-sheet{display:none;}

          .no-print{display:none !important;}
